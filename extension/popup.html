<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      padding: 20px 16px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #222;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      margin-bottom: 8px;
    }
    h2 {
      font-size: 15px;
      font-weight: 700;
      color: #cc0000;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4caf82;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .connected {
      font-size: 12px;
      color: #4caf82;
      font-weight: 600;
    }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 14px 0;
    }
    .how-to {
      font-size: 11px;
      color: #666;
      text-align: left;
      line-height: 1.7;
    }
    .how-to strong { color: #333; }
  </style>
</head>
<body>
  <div class="logo">👁️</div>
  <h2>Am I Spoiler?</h2>
  <p class="subtitle">Hover any YouTube video thumbnail<br>and click <strong>Spoiler?</strong> to analyze.</p>

  <span class="status-dot"></span>
  <span class="connected">Connected</span>

  <hr class="divider">

  <div class="how-to">
    <strong>How to use</strong><br>
    1. Browse YouTube as usual<br>
    2. Hover over any video card<br>
    3. Click the <strong style="color:#cc0000">Spoiler?</strong> button<br>
    4. Get instant AI analysis
  </div>
</body>
</html>
